name: Deploy → Production

on:
  # Manual trigger only — requires explicit approval in GitHub environment
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (SHA or tag)"
        required: true
      confirm:
        description: "Type 'deploy' to confirm"
        required: true

env:
  DOCKER_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "::error::You must type 'deploy' to confirm production deployment"
            exit 1
          fi

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    environment: production    # ← GitHub environment with required reviewers
    concurrency:
      group: deploy-prod
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag images as prod-latest
        run: |
          docker pull ${{ env.DOCKER_REGISTRY }}/budgix-backend:${{ github.event.inputs.image_tag }}
          docker tag  ${{ env.DOCKER_REGISTRY }}/budgix-backend:${{ github.event.inputs.image_tag }} \
                      ${{ env.DOCKER_REGISTRY }}/budgix-backend:prod-latest
          docker push ${{ env.DOCKER_REGISTRY }}/budgix-backend:prod-latest

          docker pull ${{ env.DOCKER_REGISTRY }}/budgix-frontend:${{ github.event.inputs.image_tag }}
          docker tag  ${{ env.DOCKER_REGISTRY }}/budgix-frontend:${{ github.event.inputs.image_tag }} \
                      ${{ env.DOCKER_REGISTRY }}/budgix-frontend:prod-latest
          docker push ${{ env.DOCKER_REGISTRY }}/budgix-frontend:prod-latest

      - name: Deploy to Production server (rolling)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/budgix
            export DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }}
            export IMAGE_TAG=${{ github.event.inputs.image_tag }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

      - name: Post-deploy health check
        run: |
          sleep 30
          for i in 1 2 3; do
            curl --fail ${{ secrets.PROD_URL }}/health && break
            echo "Retry $i..."
            sleep 10
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prod-${{ github.event.inputs.image_tag }}
          name: "Production — ${{ github.event.inputs.image_tag }}"
          body: "Deployed by ${{ github.actor }}"
          generate_release_notes: true
