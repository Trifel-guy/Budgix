name: Deploy → Staging

on:
  push:
    branches: [staging]

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Set lowercase Docker registry
        run: |
          OWNER_LOWERCASE="${GITHUB_REPOSITORY_OWNER,,}"
          echo "DOCKER_REGISTRY=ghcr.io/${OWNER_LOWERCASE}" >> "$GITHUB_ENV"

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/budgix-backend:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_REGISTRY }}/budgix-backend:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/budgix-frontend:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_REGISTRY }}/budgix-frontend:staging-latest
          build-args: VITE_API_URL=/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Check required secrets
        run: |
          test -n "${{ secrets.INT_HOST }}" || (echo "INT_HOST is missing" && exit 1)
          test -n "${{ secrets.INT_USER }}" || (echo "INT_USER is missing" && exit 1)
          test -n "${{ secrets.INT_SSH_KEY }}" || (echo "INT_SSH_KEY is missing" && exit 1)
          test -n "${{ secrets.INT_URL }}" || (echo "INT_URL is missing" && exit 1)

      - name: Deploy to Staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/budgix
            export DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }}
            export IMAGE_TAG=${{ env.IMAGE_TAG }}
            docker compose -f docker-compose.staging.yml pull
            docker compose -f docker-compose.staging.yml up -d --remove-orphans
            docker image prune -f

      - name: Health check
        run: |
          sleep 20
          curl --fail ${{ secrets.STAGING_URL }}/health || exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::error::Staging deployment failed for ${{ env.IMAGE_TAG }}"
