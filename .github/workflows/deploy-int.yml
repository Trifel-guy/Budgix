name: Deploy → Integration

on:
  push:
    branches: [main]

env:
  DOCKER_REGISTRY: ghcr.io/${{ github.repository_owner.toLowerCase() }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy-int:
    name: Deploy to INT
    runs-on: ubuntu-latest
    environment: integration
    concurrency:
      group: deploy-int
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/budgix-backend:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_REGISTRY }}/budgix-backend:int-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/budgix-frontend:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_REGISTRY }}/budgix-frontend:int-latest
          build-args: VITE_API_URL=/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to INT server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.INT_HOST }}
          username: ${{ secrets.INT_USER }}
          key: ${{ secrets.INT_SSH_KEY }}
          script: |
            cd /opt/budgix
            export DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }}
            export IMAGE_TAG=${{ env.IMAGE_TAG }}
            docker compose -f docker-compose.int.yml pull
            docker compose -f docker-compose.int.yml up -d --remove-orphans
            docker image prune -f

      - name: Health check
        run: |
          sleep 15
          curl --fail ${{ secrets.INT_URL }}/health || exit 1
